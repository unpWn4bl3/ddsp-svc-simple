data:
  block_size: 512
  duration: 2.0
  encoder: contentvec768l12tta2x
  encoder_ckpt: pretrain/contentvec/pytorch_model.bin
  encoder_hop_size: 160
  encoder_out_channels: 768
  encoder_sample_rate: 16000
  extensions:
  - wav
  f0_extractor: rmvpe
  f0_max: 800
  f0_min: 65
  raw_path: data/raw
  sampling_rate: 44100
  train_path: data/train
  valid_path: data/val
  volume_smooth_size: 1024
device: mps
env:
  expdir: exp/default
infer:
  infer_step: 50
  method: euler
model:
  n_aux_chans: 512
  n_aux_layers: 6
  n_chans: 1024
  n_layers: 6
  n_spk: 6
  t_start: 0.0
  type: RectifiedFlow
  use_attention: false
  use_norm: true
  use_pitch_aug: true
  win_length: 2048
spks:
- Alva
- Klukai
- Koleda
- Robella
- Soppo
- Voymastina
train:
  amp_dtype: bf16
  batch_size: 8
  cache_all_data: false
  cache_device: cpu
  cache_fp16: true
  decay_step: 4000
  epochs: 50
  gamma: 0.9
  interval_force_save: 10000
  interval_log: 1
  interval_val: 10
  lambda_ddsp: 1.0
  learning_rate: 0.0005
  num_workers: 0
  save_opt: false
  weight_decay: 0.1
vocoder:
  ckpt: pretrain/nsf_hifigan/model/pc_nsf_hifigan_44.1k_hop512_128bin_2025.02.ckpt
  type: nsf-hifigan
